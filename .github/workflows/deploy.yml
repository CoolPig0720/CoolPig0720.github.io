name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd hexo-site
          npm install

      - name: Apply custom theme patches
        run: |
          cd hexo-site
          cp -f themes/_patches/layout/includes/widget/card_post_toc.pug node_modules/hexo-theme-butterfly/layout/includes/widget/card_post_toc.pug
          cp -f themes/_patches/layout/archive.pug node_modules/hexo-theme-butterfly/layout/archive.pug
          cp -f themes/_patches/source/js/main.js node_modules/hexo-theme-butterfly/source/js/main.js
          cp -f themes/_patches/source/js/utils.js node_modules/hexo-theme-butterfly/source/js/utils.js

      - name: Generate static files
        run: |
          cd hexo-site
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hexo-site/public
          publish_branch: gh-pages
          force_orphan: true
