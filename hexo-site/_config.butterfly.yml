# --------------------------------------
# Hexo Butterfly Theme Configuration
# CoolPig's Academic Website
# --------------------------------------

# ========================================
# 导航栏配置（经常修改）
# ========================================

# 网站导航栏设置
nav:
  # 【修改】网站 Logo 图片路径
  logo: /images/profile.png
  # 是否显示网站标题
  display_title: true
  # 是否显示文章标题
  display_post_title: true
  # 导航栏是否固定在顶部
  fixed: false

# 【修改】导航菜单配置
# 格式：菜单名: /路径/ || 图标类名
# 图标参考：https://fontawesome.com/icons
#
# 【提示】注释或删除不需要的菜单项即可隐藏
menu:
  首页: / || fas fa-home
  文章: /archives/ || fas fa-archive
  关于我: /cv/ || fas fa-file-alt
  # 关于: /about/ || fas fa-user
  # 论文: /publications/ || fas fa-book
  # 报告: /talks/ || fas fa-chalkboard-teacher
  # 教学: /teaching/ || fas fa-user-graduate
  # 作品集: /portfolio/ || fas fa-images

# 【修改】社交媒体链接
# 格式：图标类名: 链接 || 显示名称 || 颜色
social:
  fab fa-github: Github || '#24292e'\r
  fas fa-envelope: mailto:coolpig0720@gmail.com || Email || '#4a7dbe'

# --------------------------------------
# Image Settings
# --------------------------------------

# 【修改】网站图标
favicon: /images/favicon.png

# 【修改】头像配置
# img: 头像图片路径（放在 source/images/ 目录下）
# effect: 是否启用转动效果（true=转动，false=不转动）
avatar:
  img: /images/avatar.png
  effect: false

disable_top_img: true
default_top_img:
index_img:
archive_img:
tag_img:
tag_per_img:
category_img:
category_per_img:
footer_img: false

# Website Background (light color instead of blue)
background: "#f5f7fa"

cover:
  index_enable: true
  archive_enable: true
  tag_enable: true
  category_enable: true
  post_cover_policy: cover
  post_cover:

# --------------------------------------
# Site Settings
# --------------------------------------

start_time: 2025-01-01
timezone: Asia/Shanghai

# --------------------------------------
# Aside (Sidebar) Settings
# --------------------------------------

# ========================================
# 侧边栏配置（经常修改）
# ========================================

aside:
  # 是否启用侧边栏
  enable: true
  # 是否隐藏侧边栏
  hide: false
  # 是否显示侧边栏切换按钮
  button: true
  # 移动端是否显示侧边栏
  mobile: true
  # 侧边栏位置：left 或 right
  position: left

  # 【修改】作者信息卡片
  card_author:
    enable: true
    # 【修改】个人简介文字（直接写字符串，不要用对象格式）
    description: 路虽远行则将至，事虽难做则必成。
    # 【禁用】Follow Me 按钮（因为下面已有社交图标）
    button:
      enable: false

  # 【修改】公告卡片
  card_announcement:
    enable: true
    # 【修改】公告内容
    content: 欢迎来到我的个人网站！

  # 最新文章卡片
  card_recent_post:
    enable: true
    # 显示文章数量
    limit: 5
    # 排序方式：date 或 updated
    sort: date

  # 分类卡片
  card_categories:
    enable: true
    limit: 0
    expand: none

  # 标签卡片（已禁用）
  card_tags:
    enable: false

  # 归档卡片（已禁用）
  card_archives:
    enable: false

  # 网站信息卡片（已禁用）
  card_webinfo:
    enable: false

# --------------------------------------
# Index Page Settings
# --------------------------------------

index_post_content:
  method: 3
  length: 500

# --------------------------------------
# Code Blocks Settings
# --------------------------------------

code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# --------------------------------------
# Pagination Settings
# --------------------------------------

pagination:
  enable: true
  total: 10
  type: auto
  prev_text: '<i class="fas fa-angle-left"></i>'
  next_text: '<i class="fas fa-angle-right"></i>'
  offset: 0

# --------------------------------------
# Comments Settings
# --------------------------------------

comments:
  use:
  text: true
  lazyload: false
  count: false
  card_post_count: false

# --------------------------------------
# Donation/Sponsor Settings
# --------------------------------------

donate:
  enable: false
  title:
  QR_code:

# --------------------------------------
# MathJax Support
# --------------------------------------

math:
  use: mathjax
  per_page: true

# --------------------------------------
# Mermaid Support (Client-side rendering)
# --------------------------------------

mermaid:
  enable: true
  version: "10"
  theme: "default"

# --------------------------------------
# Search Settings
# --------------------------------------

search:
  use: local_search
  placeholder: 搜索文章...

# Algolia search
algolia_search:
  enable: false
  hits:
    per_page: 6
  labels:
    input_placeholder: Search for Posts
    hits_empty: "We didn't find any results for the search you were looking for:{query}"
    hits_stats: "{hits} results found in {time} ms"

# Local search
local_search:
  enable: true
  preload: false
  CDN:

# --------------------------------------
# Share Settings
# --------------------------------------

# 【禁用】文章分享功能
share:
  use: ""
  sharejs:
    sites: ""
  addthis:
    enable: false
    pubid:

# --------------------------------------
# Post Copyright Settings
# --------------------------------------

# 【禁用】文章版权声明区域
post_copyright:
  enable: false

# 【禁用】文章编辑按钮
post_edit:
  enable: false

# --------------------------------------
# Dark Mode Settings
# --------------------------------------

darkmode:
  enable: true
  button: true

# --------------------------------------
# Translate Settings (Traditional/Simplified Chinese)
# --------------------------------------

translate:
  enable: true
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: "繁"
  msgToSimplifiedChinese: "简"

# --------------------------------------
# Right Side Buttons
# --------------------------------------

rightside_item_order:
  enable: true
  hide: readmode,translate,darkmode,hideAside
  show: toc

# --------------------------------------
# Read Mode
# --------------------------------------

readmode: true

# --------------------------------------
# TOC (Table of Contents) Settings
# --------------------------------------

toc:
  enable: true
  number: false
  depth: 2
  expand_percent: 0
  scroll_percent: false
  scrollspy: false
  update_url: false

# --------------------------------------
# Analytics
# --------------------------------------

analytics:
  baidu:
  google:
  cnzz:
  tencent:
    enable: false
    sid:
    cid:

# --------------------------------------
# Verification
# --------------------------------------

verification:
  google:
  baidu:
  yandex:
  so:
  sogou:

# --------------------------------------
# Other Settings
# --------------------------------------

busuanzi:
  enable: false

copy:
  enable: true
  copyright:
    enable: false
    limit_count: 50

wordcount:
  enable: true
  count_on_home: false
  post_wordcount: true
  min2read: true
  wordcount: true
  separation: true

lazyload:
  enable: false
  field: post
  placeholder:
  blur: false
  progress: false
  error_img: false
  stream: false

pjax:
  enable: false

# --------------------------------------
# Inject Custom Code
# --------------------------------------

inject:
  enable: true
  head: []
  bottom:
    - |-
      <style>
      /* ====== 放大网站标题 ====== */
      #blog-info .site-name {
        font-size: 1.4em !important;
        font-weight: 600 !important;
      }

      #blog-info .site-icon {
        width: 32px !important;
        height: 32px !important;
        margin-right: 8px !important;
        vertical-align: middle !important;
      }

      #blog-info .site-name {
        vertical-align: middle !important;
      }

      /* ====== 减小导航栏与内容之间的距离 ====== */
      #page-header {
        margin-bottom: 0 !important;
      }

      #content-inner {
        margin-top: 10px !important;
        padding-top: 0 !important;
      }

      .layout {
        margin-top: 10px !important;
      }

      /* ====== 导航标签样式 ====== */
      #menus .menus_item {
        margin: 0 4px !important;
      }

      #menus .site-page {
        font-size: 1em !important;
        padding: 8px 12px !important;
        border-radius: 8px !important;
        transition: all 0.3s ease !important;
      }

      #menus .site-page:hover {
        background: rgba(102, 126, 234, 0.1) !important;
        transform: translateY(-2px) !important;
      }

      #menus .site-page i {
        font-size: 1em !important;
        margin-right: 5px !important;
      }

      /* 搜索按钮独立样式 */
      #search-button {
        margin-right: 8px !important;
      }
      #search-button .site-page {
        background: rgba(102, 126, 234, 0.12) !important;
        border-radius: 20px !important;
        padding: 6px 14px !important;
        font-size: 0.92em !important;
        color: var(--text-highlight-color, #667eea) !important;
      }
      #search-button .site-page:hover {
        background: rgba(102, 126, 234, 0.22) !important;
        color: var(--text-highlight-color, #667eea) !important;
      }

      /* ====== 侧边栏作者卡片 - 隐藏标签统计 ====== */
      .site-data a:nth-child(2) {
        display: none !important;
      }

      /* ====== 放大文章和分类统计 ====== */
      .site-data a {
        padding: 12px 18px !important;
        margin: 6px !important;
      }

      .site-data .headline {
        font-size: 1.15em !important;
        font-weight: 600 !important;
      }

      .site-data .length-num {
        font-size: 1.5em !important;
        font-weight: bold !important;
      }

      /* ====== 表格文字居中 ====== */
      body #post #article-container table,
      body #post #article-container .table-wrap table {
        text-align: center !important;
      }

      body #post #article-container table th,
      body #post #article-container table td,
      body #post #article-container .table-wrap table th,
      body #post #article-container .table-wrap table td {
        text-align: center !important;
        vertical-align: middle !important;
      }

      /* ====== 增大正文字号，减小行高与间距 ====== */
      body #post #article-container {
        font-size: 1.05em !important;
        line-height: 1.7 !important;
      }

      body #post #article-container p {
        margin: 0.6em 0 !important;
      }

      body #post #article-container li {
        margin: 0.3em 0 !important;
        line-height: 1.7 !important;
      }

      body #post #article-container li > p {
        margin: 0.2em 0 !important;
      }

      body #post #article-container ol,
      body #post #article-container ul {
        margin: 0.5em 0 !important;
        padding-left: 1.8em !important;
      }

      /* ====== 归档页分类分组样式 ====== */
      .category-group {
        margin-bottom: 16px !important;
        background: var(--card-bg) !important;
        border-radius: 12px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important;
        overflow: hidden !important;
        transition: box-shadow 0.3s ease !important;
      }
      .category-group:hover {
        box-shadow: 0 4px 16px rgba(102,126,234,0.12) !important;
      }
      .category-group-title {
        font-size: 1.1em !important;
        font-weight: 600 !important;
        padding: 14px 20px !important;
        margin-bottom: 0 !important;
        border-left: none !important;
        background: transparent !important;
        border-radius: 12px !important;
        color: var(--font-color) !important;
        cursor: pointer !important;
        user-select: none !important;
        transition: all 0.25s ease !important;
        display: flex !important;
        align-items: center !important;
        gap: 4px !important;
      }
      .category-group-title:hover {
        background: rgba(102, 126, 234, 0.08) !important;
        color: var(--text-highlight-color, #667eea) !important;
      }
      .category-group-title i.fas.fa-folder {
        color: var(--text-highlight-color, #667eea) !important;
        font-size: 1em !important;
      }
      .category-toggle-icon {
        font-size: 0.8em !important;
        margin-right: 6px !important;
        color: var(--text-highlight-color, #667eea) !important;
        transition: transform 0.3s ease !important;
      }
      .category-group[data-collapsed='false'] .category-toggle-icon {
        transform: rotate(90deg) !important;
      }
      .category-group-count {
        font-size: 0.78em !important;
        font-weight: 500 !important;
        color: #fff !important;
        background: var(--text-highlight-color, #667eea) !important;
        border-radius: 12px !important;
        padding: 1px 10px !important;
        margin-left: auto !important;
      }
      .category-group-posts {
        max-height: 0 !important;
        overflow: hidden !important;
        padding: 0 20px !important;
        transition: max-height 0.4s ease, padding 0.3s ease !important;
      }
      .category-group[data-collapsed='false'] .category-group-posts {
        max-height: 2000px !important;
        padding: 4px 20px 16px !important;
      }
      .category-group-posts .article-sort-item {
        padding: 10px 14px !important;
        margin: 6px 0 !important;
        border-radius: 8px !important;
        transition: background 0.2s ease !important;
      }
      .category-group-posts .article-sort-item:hover {
        background: rgba(102, 126, 234, 0.06) !important;
      }
      .category-group-posts .article-sort-item-title {
        font-weight: 500 !important;
      }
      /* 归档页总标题美化 */
      #archive .article-sort-title {
        font-size: 1.4em !important;
        font-weight: 700 !important;
        margin-bottom: 24px !important;
        padding-bottom: 12px !important;
        border-bottom: 2px solid rgba(102,126,234,0.15) !important;
      }

      /* ====== 三栏布局：左侧栏 + 主内容 + 右侧TOC（全宽） ====== */
      @media (min-width: 901px) {
        .layout {
          max-width: 100% !important;
          padding: 40px 20px !important;
        }

        /* 隐藏侧边栏时，主内容居中且有最大宽度 */
        .layout.hide-aside {
          max-width: 1000px !important;
        }

        .layout.hide-aside > div:first-child {
          width: 100% !important;
          flex: none !important;
        }

        /* 左侧栏固定宽度 */
        #aside-content {
          width: 280px !important;
          flex-shrink: 0 !important;
        }

        /* 主内容区 - 弹性填充中间空间 */
        .layout > div:first-child {
          width: auto !important;
          flex: 1 !important;
          margin-right: 0 !important;
          min-width: 0 !important;
        }

        /* 侧边栏卡片更紧凑 */
        #aside-content .card-widget {
          padding: 16px 18px !important;
          margin-bottom: 15px !important;
        }
      }

      /* ====== 最新文章卡片：标题单行截断+省略号 ====== */
      .card-recent-post .aside-list .aside-list-item .content > .title {
        -webkit-line-clamp: 1 !important;
      }

      /* 右侧TOC容器样式 */
      #right-toc-container {
        display: none;
      }

      @media (min-width: 901px) {
        #right-toc-container {
          display: block !important;
          width: 240px !important;
          flex-shrink: 0 !important;
          order: 3 !important;
          padding-left: 0 !important;
        }

        #right-toc-container .sticky_layout {
          position: sticky !important;
          top: 20px !important;
          transition: top .3s;
        }

        /* 右侧TOC卡片样式 */
        #right-toc-container #card-toc {
          padding: 16px 18px !important;
          margin-bottom: 15px !important;
          background: var(--card-bg) !important;
          box-shadow: var(--card-box-shadow) !important;
          border-radius: 8px !important;
        }

        #right-toc-container #card-toc .toc-content {
          max-height: calc(100vh - 120px) !important;
          overflow-y: auto !important;
          margin: 0 -18px !important;
          width: calc(100% + 36px) !important;
        }

        #right-toc-container #card-toc .toc-content > * {
          margin: 0 12px !important;
        }

        #right-toc-container #card-toc .toc-link {
          margin: 3px 0 !important;
          padding: 1px 6px !important;
          font-size: 0.88em !important;
        }

        #right-toc-container #card-toc .item-headline {
          font-size: 1.1em !important;
          padding-bottom: 4px !important;
        }
      }
      </style>
    - |-
      <script>
      // 将TOC目录从左侧侧边栏移动到右侧独立容器
      function moveTocToRight() {
        var toc = document.getElementById('card-toc');
        var layout = document.querySelector('.layout');
        if (!toc || !layout) return;

        // 只在桌面端(>=901px)执行移动
        if (window.innerWidth < 901) return;

        var rightContainer = document.getElementById('right-toc-container');
        if (!rightContainer) {
          rightContainer = document.createElement('div');
          rightContainer.id = 'right-toc-container';
          var stickyWrap = document.createElement('div');
          stickyWrap.className = 'sticky_layout';
          rightContainer.appendChild(stickyWrap);
          layout.appendChild(rightContainer);
        }

        var stickyWrap = rightContainer.querySelector('.sticky_layout');
        if (toc.parentElement !== stickyWrap) {
          stickyWrap.appendChild(toc);
          toc.style.display = 'block';
        }
      }

      // 页面加载和窗口resize时执行
      document.addEventListener('DOMContentLoaded', function() {
        moveTocToRight();
        setTimeout(moveTocToRight, 500);
      });
      window.addEventListener('resize', function() {
        moveTocToRight();
      });

      // PJAX导航后重新执行
      document.addEventListener('pjax:complete', function() {
        moveTocToRight();
        setTimeout(moveTocToRight, 500);
      });

      // ====== 修复：滚动时显示右侧按钮（回到顶部、黑夜模式等）======
      (function() {
        var rightside = document.getElementById('rightside');
        if (!rightside) return;

        function toggleRightside() {
          var scrollY = window.scrollY || document.documentElement.scrollTop;
          if (scrollY > 200) {
            rightside.classList.add('rightside-show');
          } else {
            rightside.classList.remove('rightside-show');
          }
        }

        // 页面加载时检查一次
        toggleRightside();
        // 滚动时切换显示
        window.addEventListener('scroll', function() {
          toggleRightside();
        }, { passive: true });
      })();

      // ====== 归档页分类展开/收起 ======
      document.querySelectorAll('.category-group-title').forEach(function(title) {
        title.addEventListener('click', function() {
          var group = this.parentElement;
          var isCollapsed = group.getAttribute('data-collapsed') === 'true';
          group.setAttribute('data-collapsed', isCollapsed ? 'false' : 'true');
          this.setAttribute('aria-expanded', isCollapsed ? 'true' : 'false');
        });
        // 支持键盘 Enter/Space 操作
        title.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.click();
          }
        });
      });
      </script>

